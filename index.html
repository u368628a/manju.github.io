<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Log Tracker">
  <link rel="apple-touch-icon" href="https://placehold.co/180x180/4f46e5/ffffff?text=Log">
  <link rel="icon" href="data:,">
  
  <title>ISS Vanguard Log Tracker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    /* iOS特有のセーフエリア（ノッチ等）への対応 */
    .pt-safe { padding-top: env(safe-area-inset-top); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-slate-900 selection:bg-indigo-500/30">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icons = {
      BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
      Plus: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
      Square: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-slate-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>,
      CheckSquare: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-emerald-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>,
      Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
      ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
      ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>,
      Book: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-12 h-12 mx-auto mb-3 opacity-20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>,
      CheckSquareSmall: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
    };

    function App() {
      const [storageError, setStorageError] = useState(false);

      const [logs, setLogs] = useState(() => {
        try {
          const savedLogs = localStorage.getItem('iss-vanguard-logs');
          if (savedLogs) {
            return JSON.parse(savedLogs);
          }
        } catch (e) {
          console.warn("LocalStorageへのアクセスが拒否されたか、読み込みに失敗しました:", e);
        }
        return [];
      });

      const [newLogNumber, setNewLogNumber] = useState('');
      const [expandedLogId, setExpandedLogId] = useState(null);

      useEffect(() => {
        try {
          localStorage.setItem('iss-vanguard-logs', JSON.stringify(logs));
          setStorageError(false);
        } catch (e) {
          console.warn("LocalStorageへの保存が拒否されました:", e);
          setStorageError(true);
        }
      }, [logs]);

      const generateId = () => Math.random().toString(36).substr(2, 9);

      const handleAddLog = (e) => {
        e.preventDefault();
        
        let inputStr = newLogNumber.trim();
        if (!inputStr) return;

        // ゼロ埋めの除去処理（先頭の連続する0を削除、ただし直後に数字が続く場合のみ）
        inputStr = inputStr.replace(/^0+(?=\d)/, '');

        const isDuplicate = logs.some(log => log.number === inputStr);
        if (isDuplicate) {
            alert('このログ番号は既に存在します。');
            return;
        }

        const newLog = {
          id: generateId(),
          number: inputStr,
          isRead: false,
          checkboxes: [],
          createdAt: Date.now()
        };

        setLogs([...logs, newLog].sort((a, b) => {
          const numA = parseInt(a.number);
          const numB = parseInt(b.number);
          if (!isNaN(numA) && !isNaN(numB)) {
            return numA - numB;
          }
          return a.number.localeCompare(b.number);
        }));
        setNewLogNumber('');
      };

      const toggleReadStatus = (logId) => {
        setLogs(logs.map(log => 
          log.id === logId ? { ...log, isRead: !log.isRead } : log
        ));
      };

      const handleAddCheckbox = (logId) => {
        setLogs(logs.map(log => {
          if (log.id === logId) {
            return {
              ...log,
              checkboxes: [
                ...log.checkboxes,
                { id: generateId(), isChecked: false }
              ]
            };
          }
          return log;
        }));
      };

      const toggleCheckbox = (logId, checkboxId) => {
        setLogs(logs.map(log => {
          if (log.id === logId) {
            return {
              ...log,
              checkboxes: log.checkboxes.map(cb => 
                cb.id === checkboxId ? { ...cb, isChecked: !cb.isChecked } : cb
              )
            };
          }
          return log;
        }));
      };

      const removeCheckbox = (logId, checkboxId) => {
        setLogs(logs.map(log => {
          if (log.id === logId) {
            return {
              ...log,
              checkboxes: log.checkboxes.filter(cb => cb.id !== checkboxId)
            };
          }
          return log;
        }));
      };

      const handleDeleteLog = (logId) => {
        if (confirm('このログを削除してもよろしいですか？')) {
            setLogs(logs.filter(log => log.id !== logId));
        }
      };

      const toggleExpand = (logId) => {
        setExpandedLogId(expandedLogId === logId ? null : logId);
      };

      const calculateProgress = (log) => {
        if (log.checkboxes.length === 0) return null;
        const checkedCount = log.checkboxes.filter(cb => cb.isChecked).length;
        return `${checkedCount}/${log.checkboxes.length}`;
      };

      return (
        <div className="min-h-screen text-slate-100 font-sans pb-safe">
          <header className="bg-slate-800 border-b border-slate-700 sticky top-0 z-10 shadow-md pt-safe">
            <div className="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Icons.BookOpen />
                <h1 className="text-xl font-bold tracking-tight">Log Tracker</h1>
              </div>
              <div className="text-xs text-slate-400 font-medium bg-slate-800/50 px-2 py-1 rounded-full border border-slate-700">
                Total: {logs.length}
              </div>
            </div>
            <div className="max-w-md mx-auto px-4 pb-4">
              <form onSubmit={handleAddLog} className="flex gap-2">
                <input
                  type="text"
                  inputMode="decimal"
                  value={newLogNumber}
                  onChange={(e) => setNewLogNumber(e.target.value)}
                  placeholder="Log 番号 (例: 123)"
                  className="flex-1 bg-slate-900 border border-slate-700 text-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-500"
                />
                <button
                  type="submit"
                  disabled={!newLogNumber.trim()}
                  className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-3 rounded-xl font-medium flex items-center gap-2 transition-colors"
                >
                  <Icons.Plus />
                </button>
              </form>
            </div>
          </header>

          <main className="max-w-md mx-auto p-4 pb-24">
            {storageError && (
              <div className="mb-4 bg-red-900/50 border border-red-500/50 text-red-200 p-3 rounded-lg text-sm">
                <strong>警告:</strong> ブラウザの追跡防止設定等により、データの保存がブロックされています。このまま使用すると、画面を閉じた際にデータが消去されます。
              </div>
            )}

            <div className="space-y-3">
              {logs.length === 0 ? (
                <div className="text-center py-12 text-slate-500 bg-slate-800/50 rounded-2xl border border-slate-800 border-dashed">
                  <Icons.Book />
                  <p>ログがありません。<br/>上部の入力欄から番号を追加してください。</p>
                </div>
              ) : (
                logs.map(log => {
                  const isExpanded = expandedLogId === log.id;
                  const progress = calculateProgress(log);

                  return (
                    <div 
                      key={log.id} 
                      className={`bg-slate-800 rounded-xl border transition-colors overflow-hidden ${
                        log.isRead ? 'border-slate-700/50 bg-slate-800/50' : 'border-slate-600'
                      }`}
                    >
                      <div 
                        onClick={() => toggleExpand(log.id)}
                        className="p-4 flex items-center justify-between cursor-pointer active:bg-slate-700/30 transition-colors"
                      >
                        <div className="flex items-center gap-3">
                          <div className={`w-2 h-10 rounded-full ${log.isRead ? 'bg-slate-600' : 'bg-indigo-500'}`} />
                          <div>
                            <h2 className={`text-lg font-bold flex items-center gap-2 ${log.isRead ? 'text-slate-400 line-through decoration-slate-500/50' : 'text-slate-100'}`}>
                              Log {log.number}
                              {log.isRead && <Icons.Check />}
                            </h2>
                            {progress && (
                              <div className="text-xs text-slate-400 font-medium flex items-center gap-1 mt-0.5">
                                <Icons.CheckSquareSmall />
                                {progress} 完了
                              </div>
                            )}
                          </div>
                        </div>
                        {isExpanded ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                      </div>

                      {isExpanded && (
                        <div className="px-4 pb-4 pt-2 border-t border-slate-700/50 bg-slate-800/30">
                          <div className="flex gap-2 mb-4">
                            <button
                              onClick={() => toggleReadStatus(log.id)}
                              className={`flex-1 py-3 px-3 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2 ${
                                log.isRead 
                                  ? 'bg-slate-700 text-slate-300 active:bg-slate-600' 
                                  : 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 active:bg-emerald-500/20'
                              }`}
                            >
                              {log.isRead ? '未読に戻す' : '既読にする'}
                            </button>
                            <button
                              onClick={() => handleAddCheckbox(log.id)}
                              className="flex-1 bg-slate-700 active:bg-slate-600 text-slate-200 py-3 px-3 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2"
                            >
                              <Icons.Plus /> チェック枠追加
                            </button>
                          </div>

                          {log.checkboxes.length > 0 && (
                            <div className="space-y-2 mb-4">
                              {log.checkboxes.map((cb, index) => (
                                <div key={cb.id} className="flex items-center justify-between bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                                  <button
                                    onClick={() => toggleCheckbox(log.id, cb.id)}
                                    className="flex items-center gap-3 flex-1 text-left py-2"
                                  >
                                    {cb.isChecked ? <Icons.CheckSquare /> : <Icons.Square />}
                                    <span className={cb.isChecked ? 'text-slate-400 line-through' : 'text-slate-200'}>
                                      枠 {index + 1}
                                    </span>
                                  </button>
                                  <button
                                    onClick={() => removeCheckbox(log.id, cb.id)}
                                    className="p-3 text-slate-500 active:text-red-400 transition-colors rounded-md active:bg-slate-800"
                                  >
                                    <Icons.Trash2 />
                                  </button>
                                </div>
                              ))}
                            </div>
                          )}

                          <div className="flex justify-end pt-2 border-t border-slate-700/50 mt-2">
                            <button
                              onClick={() => handleDeleteLog(log.id)}
                              className="text-red-400 active:text-red-300 text-sm font-medium flex items-center gap-1 px-3 py-2 rounded active:bg-red-400/10 transition-colors"
                            >
                              <Icons.Trash2 /> ログを削除
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
